<div>
    <div class="modal-header">
        <h3 class="modal-title">{{title}}</h3>
    </div>
    <div class="modal-body overflowX" ng-bind-html="message">
    </div>
    <div class="modal-footer">
        <button class="btn btn-primary" ng-click="onButton1()">{{button1Text}}</button>
        <button class="btn btn-default" ng-click="onButton2()" ng-show="button2Text != null">{{button2Text}}</button>
    </div>
</div>
